<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#121212" />
    <meta
      name="description"
      content="Premium Online Food Delivery - Discover Gourmet Delicacies Near You"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Google Fonts: Plus Jakarta Sans, Inter & JetBrains Mono (Stitch Design System) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: {
          preflight: false, // Prevent Tailwind from resetting existing app fonts/heading/button styles
        },
        theme: {
          extend: {
            animation: {
              'fade-in-slow': 'fadeIn 1.5s ease-out forwards',
              'float': 'float 8s ease-in-out infinite',
              'float-slow': 'floatSlow 14s ease-in-out infinite',
              'float-spin': 'floatSpin 20s linear infinite',
              'drift-one': 'driftOne 25s ease-in-out infinite',
              'drift-two': 'driftTwo 30s ease-in-out infinite',
              'drift-three': 'driftThree 22s ease-in-out infinite',
              'drift-four': 'driftFour 28s ease-in-out infinite',
              'slow-rotate': 'slowRotate 120s linear infinite',
              'spark-rise': 'rise 16s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(15px)' },
                '100%': { opacity: '0.12', transform: 'translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(-15px) rotate(4deg)' },
              },
              floatSlow: {
                '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(-25px) rotate(-6deg)' },
              },
              floatSpin: {
                '0%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(-20px) rotate(180deg)' },
                '100%': { transform: 'translateY(0) rotate(360deg)' }
              },
              driftOne: {
                '0%, 100%': { transform: 'translate(0px, 0px) scale(1) rotate(0deg)' },
                '33%': { transform: 'translate(120px, 70px) scale(1.15) rotate(60deg)' },
                '66%': { transform: 'translate(-50px, 130px) scale(0.85) rotate(120deg)' },
              },
              driftTwo: {
                '0%, 100%': { transform: 'translate(0px, 0px) scale(1) rotate(0deg)' },
                '50%': { transform: 'translate(-140px, -70px) scale(1.2) rotate(-90deg)' },
              },
              driftThree: {
                '0%, 100%': { transform: 'translate(0px, 0px) scale(1) rotate(0deg)' },
                '33%': { transform: 'translate(-80px, 100px) scale(0.9) rotate(-45deg)' },
                '66%': { transform: 'translate(100px, -60px) scale(1.1) rotate(45deg)' },
              },
              driftFour: {
                '0%, 100%': { transform: 'translate(0px, 0px) scale(1) rotate(0deg)' },
                '50%': { transform: 'translate(110px, -90px) scale(1.15) rotate(90deg)' },
              },
              slowRotate: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' }
              },
              rise: {
                '0%': { transform: 'translateY(105vh) translateX(0px) scale(0.8)', opacity: '0' },
                '20%': { opacity: '0.15' },
                '80%': { opacity: '0.15' },
                '100%': { transform: 'translateY(-10vh) translateX(45px) scale(1.2)', opacity: '0' }
              }
            }
          }
        }
      }
    </script>
    
    <title>BiteSwift | Premium Food Delivery</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
